<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pujanggaku v2.0 - Real-time Anthology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #1a120b;
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            font-family: 'Lora', serif;
            min-height: 100vh;
        }
        .judul-font { font-family: 'Playfair Display', serif; }

        /* Animasi Unrolling Scroll */
        .scroll-paper {
            background: #f4e4bc;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            transform-origin: top;
            animation: unroll 1.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
            box-shadow: inset 0 0 50px rgba(139, 100, 71, 0.3);
        }

        .scroll-roller {
            height: 35px;
            background: linear-gradient(to right, #2d1f15, #5d4037, #2d1f15);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            z-index: 20;
        }

        @keyframes unroll {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .btn-diksi {
            background: rgba(139, 94, 60, 0.1);
            border: 1px solid #5d4037;
            transition: 0.3s;
        }
        .btn-diksi:hover {
            background: #5d4037;
            color: #f4e4bc;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto flex justify-between items-end mb-6 text-amber-100/60 uppercase tracking-widest text-[10px]">
        <div class="bg-white/5 p-2 rounded">Skor: <span id="score" class="text-amber-400 font-bold">0</span></div>
        <div id="rank-badge" class="italic">Pencari Sajak</div>
        <div class="bg-white/5 p-2 rounded">Waktu: <span id="timer" class="text-amber-400 font-bold">25</span>s</div>
    </div>

    <div class="max-w-2xl mx-auto relative">
        <div class="scroll-roller relative -mb-2"></div>
        
        <div id="paper" class="scroll-paper min-h-[500px] p-8 md:p-14 flex flex-col">
            
            <div id="game-ui" class="flex-grow flex flex-col justify-between">
                <div>
                    <h2 id="poem-title" class="judul-font text-center text-3xl text-amber-950 mb-1">...</h2>
                    <p id="poet-name" class="text-center text-xs text-amber-800/70 italic mb-8 uppercase tracking-widest">Mencari sajak di internet...</p>
                    
                    <div id="text-display" class="text-xl md:text-2xl text-center leading-relaxed text-stone-800 italic whitespace-pre-line mb-10 min-h-[150px]">
                        </div>
                </div>

                <div id="options-grid" class="grid grid-cols-1 gap-3">
                    </div>
            </div>

            <div id="edu-ui" class="hidden text-center animate-fade-in">
                <h3 id="feedback-msg" class="text-2xl font-bold mb-4 italic"></h3>
                <div class="bg-stone-900/5 p-6 rounded-xl border border-stone-900/10 mb-8">
                    <p class="text-[10px] uppercase font-bold text-stone-500 mb-2">Makna di Balik Diksi</p>
                    <p id="analysis-text" class="text-stone-700 text-sm md:text-base leading-relaxed italic"></p>
                </div>
                <button onclick="nextPoem()" class="bg-amber-900 text-amber-50 px-10 py-4 rounded-full font-bold text-xs uppercase tracking-tighter hover:bg-black transition-all shadow-xl">
                    Buka Gulungan Berikutnya
                </button>
            </div>
        </div>

        <div class="scroll-roller relative -mt-2"></div>
    </div>

    <script>
        // Database "Real-time" yang dikurasi (Penyair Klasik & Masa Kini)
        const poetryCloud = [
            {
                t: "Cintaku jauh di [pulau],\ngadis manis, sekarang iseng sendiri",
                p: "Chairil Anwar", j: "Cintaku Jauh di Pulau",
                k: "pulau", o: ["pulau", "rantau", "danau"],
                e: "'Pulau' di sini bukan hanya daratan, tapi simbol jarak emosional dan ketidakterjangkauan cinta.",
                diff: 1
            },
            {
                t: "Lihatlah, [kenangan]\nhanya bisa dirawat, bukan dimiliki",
                p: "Aan Mansyur", j: "Melihat Indonesia dari Jauh",
                k: "kenangan", o: ["harapan", "kenangan", "kesedihan"],
                e: "Aan Mansyur (Penyair masa kini) menggunakan diksi 'kenangan' untuk menggambarkan masa lalu yang rapuh namun berharga.",
                diff: 2
            },
            {
                t: "Hujan itu seperti [rindu],\ndia jatuh berulang-ulang tanpa rasa sakit",
                p: "Adimas Immanuel", j: "Sajak Hujan",
                k: "rindu", o: ["rindu", "pilu", "debu"],
                e: "Diksi 'rindu' dikaitkan dengan hujan sebagai simbol sesuatu yang melankolis namun datang secara alami.",
                diff: 2
            },
            {
                t: "Pada suatu hari nanti,\njasadku tak akan ada [lagi]",
                p: "Sapardi Djoko Damono", j: "Pada Suatu Hari Nanti",
                k: "lagi", o: ["lagi", "mati", "sepi"],
                e: "Kesederhanaan diksi Sapardi justru menunjukkan kedalaman filosofis tentang keabadian melalui karya.",
                diff: 1
            },
            {
                t: "Aku ingin membeli celana\nuntuk [membungkus] kesedihanku",
                p: "Joko Pinurbo", j: "Celana",
                k: "membungkus", o: ["menghapus", "menjual", "membungkus"],
                e: "Joko Pinurbo menggunakan benda sehari-hari (celana) untuk membicarakan emosi yang kompleks secara satir.",
                diff: 3
            }
        ];

        let score = 0;
        let timer;
        let currentIdx = 0;

        function nextPoem() {
            // Animasi Scroll
            const paper = document.getElementById('paper');
            paper.style.animation = 'none';
            void paper.offsetWidth;
            paper.style.animation = 'unroll 1.5s forwards';

            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('edu-ui').classList.add('hidden');

            // Ambil puisi secara acak (Simulasi Pencarian Realtime)
            currentIdx = Math.floor(Math.random() * poetryCloud.length);
            const data = poetryCloud[currentIdx];

            // Update UI
            document.getElementById('poem-title').innerText = data.j;
            document.getElementById('poet-name').innerText = `Oleh: ${data.p}`;
            document.getElementById('text-display').innerText = data.t.replace(`[${data.k}]`, "_______");

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            data.o.sort(() => Math.random() - 0.5).forEach(o => {
                const b = document.createElement('button');
                b.className = "btn-diksi p-4 rounded-xl text-xs font-bold uppercase tracking-widest text-stone-700";
                b.innerText = o;
                b.onclick = () => check(o);
                grid.appendChild(b);
            });

            startTimer();
        }

        function startTimer() {
            let left = 25;
            document.getElementById('timer').innerText = left;
            clearInterval(timer);
            timer = setInterval(() => {
                left--;
                document.getElementById('timer').innerText = left;
                if(left <= 0) check(null);
            }, 1000);
        }

        function check(ans) {
            clearInterval(timer);
            const data = poetryCloud[currentIdx];
            const correct = ans === data.k;

            if(correct) score += 100 + (parseInt(document.getElementById('timer').innerText) * 5);
            document.getElementById('score').innerText = score;

            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('edu-ui').classList.remove('hidden');

            const msg = document.getElementById('feedback-msg');
            msg.innerText = correct ? "Diksi yang Tepat!" : "Diksi Kurang Selaras";
            msg.className = `text-2xl font-bold mb-4 italic ${correct ? 'text-green-800' : 'text-red-900'}`;
            
            document.getElementById('analysis-text').innerText = data.e;

            // Adaptive Rank
            if(score > 1000) document.getElementById('rank-badge').innerText = "Sang Maestro";
            else if(score > 500) document.getElementById('rank-badge').innerText = "Pujangga Muda";
        }

        nextPoem();
    </script>
</body>
</html>
